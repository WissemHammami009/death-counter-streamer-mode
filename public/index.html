<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Death Counter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main id="counter-box">
    <div class="counter-header">
      <span class="live-dot"></span>
      <span class="counter-title">DEATH COUNTER</span>
    </div>

    <div class="counter-content">
      <span id="label">DEATHS</span>

      <div class="counter-value-wrapper">
        <span id="counter">0</span>
      </div>
    </div>

    <div class="counter-footer">
      <span class="footer-line"></span>
      <span class="footer-text">SESSION STATS</span>
      <span class="footer-line"></span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
